<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TTFPP Senior Experience Wizard</title>
    <meta
      name="description"
      content="Share your TTFPP field experience to help future UDS students prepare better."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700;800&family=Source+Sans+3:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css?v=20260312" />
  </head>
  <body>
    <!-- Background canvas -->
    <div class="bg-canvas" aria-hidden="true">
      <div class="bg-orb orb-1"></div>
      <div class="bg-orb orb-2"></div>
      <div class="bg-orb orb-3"></div>
      <div class="bg-grid"></div>
    </div>

    <!-- Fixed top progress bar -->
    <div
      class="top-bar"
      role="progressbar"
      aria-valuemin="0"
      aria-valuemax="100"
      aria-valuenow="0"
      aria-label="Questionnaire completion progress"
    >
      <div class="top-bar-fill" id="progressFill"></div>
    </div>

    <div class="app-shell">
      <!-- App header -->
      <header class="app-header">
        <div class="header-brand">
          <span class="brand-beacon" aria-hidden="true"></span>
          <span class="brand-wordmark">TTFPP Experience <strong>Questionnaire</strong></span>
        </div>
        <div class="header-end">
          <span class="q-counter" id="questionCounter" aria-live="polite" aria-label="Current question position"></span>
          <span class="save-chip" id="saveStatus" title="Your progress is autosaved to this device">Saved</span>
        </div>
      </header>

      <!-- Accessible progress labels (screen readers) -->
      <div class="sr-only" aria-live="polite">
        <span id="progressLabel">0% complete</span>
        <span id="progressMessage">Getting started</span>
      </div>

      <!-- Section navigation chips -->
      <nav class="section-nav" id="sectionChips" aria-label="Jump to questionnaire section"></nav>

      <!-- Main question / review area -->
      <main class="panel-host" id="panelHost" aria-live="polite" aria-atomic="false"></main>

      <!-- Wizard footer -->
      <footer class="wizard-footer">
        <button id="prevButton" type="button" class="nav-btn nav-prev" aria-label="Previous question">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M15 18l-6-6 6-6"/></svg>
          <span>Back</span>
        </button>

        <div class="footer-center">
          <div class="footer-progress-row">
            <strong class="footer-pct" id="progressLabelVis">0%</strong>
            <span class="footer-msg" id="progressMessageVis">Getting started</span>
          </div>
          <div class="footer-actions-row">
            <button id="resetButton" type="button" class="ghost-btn">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
              Reset
            </button>
          </div>
          <p id="submitStatus" class="submit-status" hidden></p>
        </div>

        <button id="nextButton" type="button" class="nav-btn nav-next" aria-label="Next question">
          <span>Next</span>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M9 18l6-6-6-6"/></svg>
        </button>
      </footer>
    </div>

    <script>
      window.TTFPP_API_BASE =
        window.TTFPP_API_BASE ||
        "https://ttfpp-senior-experience-collector.elitetransportghana.workers.dev";
    </script>
    <script type="module" src="./app.js?v=20260312"></script>
  </body>
</html>
